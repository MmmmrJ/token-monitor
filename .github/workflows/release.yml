name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal DMG
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          - name: Windows x64 MSI and NSIS
            platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Verify application versions
        run: npm run check:versions

      - name: Run Rust quality gates
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Verify tag matches app version
        shell: bash
        run: |
          node -e 'const v=require("./package.json").version; const t=process.env.GITHUB_REF_NAME.replace(/^v/,"").split("."); while(t.length<3)t.push("0"); if(t.join(".")!==v){throw new Error(`Tag ${process.env.GITHUB_REF_NAME} does not match app version ${v}`)}'

      - name: Build installers and publish GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Token Monitor ${{ github.ref_name }}
          releaseBody: |
            Token Monitor ${{ github.ref_name }} 支持读取当前本机 Codex 和 Cursor 登录态的额度信息。

            下载对应平台的安装包：
            - macOS：Universal DMG（Apple Silicon + Intel）
            - Windows：x64 MSI 或 NSIS Setup EXE

            Codex 与 Cursor 数据均来自非公开稳定接口，服务端变更可能导致读取暂时不可用。Token Monitor 不会把本机登录令牌发送到 WebView、日志或导出文件。

            当前构建未经过 Apple 公证或 Windows 商业代码签名，系统可能显示安全确认提示。

            从旧版升级：macOS 新应用名为 `Token Monitor.app`。确认新版本运行正常后，可删除旧的 `Codex Usage Monitor.app`；原有设置会继续保留。
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}
