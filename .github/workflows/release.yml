name: Release desktop installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal DMG
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          - name: Windows x64 MSI and NSIS
            platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify tag matches app version
        shell: bash
        run: |
          node -e 'const v=require("./package.json").version; const t=process.env.GITHUB_REF_NAME.replace(/^v/,"").split("."); while(t.length<3)t.push("0"); if(t.join(".")!==v){throw new Error(`Tag ${process.env.GITHUB_REF_NAME} does not match app version ${v}`)}'

      - name: Build installers and publish GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Codex Usage Monitor ${{ github.ref_name }}
          releaseBody: |
            下载对应平台的安装包：
            - macOS：Universal DMG（Apple Silicon + Intel）
            - Windows：x64 MSI 或 NSIS Setup EXE

            当前构建未经过 Apple 公证或 Windows 商业代码签名，系统可能显示安全确认提示。
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}
